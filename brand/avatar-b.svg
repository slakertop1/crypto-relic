<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1b2540"/>
      <stop offset="60%" stop-color="#0e1322"/>
      <stop offset="100%" stop-color="#0b0e14"/>
    </radialGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- шестиугольная печать (контур блока) -->
  <g filter="url(#glow)">
    <polygon points="200,52 322,124 322,276 200,348 78,276 78,124"
             fill="none" stroke="url(#hex)" stroke-width="14" stroke-linejoin="round"/>
  </g>

  <!-- внутренний тонкий гекс -->
  <polygon points="200,88 291,142 291,258 200,312 109,258 109,142"
           fill="none" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="3"/>

  <!-- руна-реликвия: ромб с чертой (простая, читается в 48px) -->
  <g filter="url(#glow)">
    <polygon points="200,124 264,200 200,276 136,200" fill="#0e1322" stroke="url(#hex)" stroke-width="12" stroke-linejoin="round"/>
    <line x1="200" y1="156" x2="200" y2="244" stroke="#ffd166" stroke-width="12" stroke-linecap="round"/>
    <circle cx="200" cy="200" r="10" fill="#fde68a"/>
  </g>

  <!-- искры-«сатоши» по углам гекса -->
  <g fill="#fbbf24">
    <circle cx="200" cy="52" r="7"/>
    <circle cx="322" cy="276" r="5" opacity="0.8"/>
    <circle cx="78" cy="276" r="5" opacity="0.8"/>
  </g>
</svg>
