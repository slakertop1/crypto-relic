<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Relic Day — daily provably-fair Bitcoin case opener</title>
  <meta name="description" content="Once a day, the whole world opens one case sealed by a Bitcoin block hash. Your drop depends on your name. No rerolls, no server, provably fair. Free daily collectible game." />
  <meta name="google-site-verification" content="onzP0fWFeHxZ5E05-hxHLGTc74GnDgUYiRVH4zPg7vw" />
  <link rel="canonical" href="https://cryptorelicday.github.io/crypto-relic/" />
  <!-- OG / Twitter Card: краулеры не выполняют JS, поэтому статика на EN (целевая аудитория).
       Язык интерфейса для людей переключается в app.js. -->
  <meta property="og:title" content="Crypto Relic Day" />
  <meta property="og:description" content="Check what today's Bitcoin block gives your name. One drop a day. No rerolls." />
  <meta property="og:type" content="website" />
  <!-- og:url намеренно НЕ задан: X склеивает карточки по каноническому URL
       и подсовывает старый кэш без картинки для всех шеринг-ссылок ?u=... -->
  <meta property="og:image" content="https://cryptorelicday.github.io/crypto-relic/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@CryptoRelicDay" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="langToggle" class="lang-toggle" type="button" aria-label="Switch language">EN</button>

  <main class="wrap">
    <header class="head">
      <h1>Крипто-реликвия <span>дня</span></h1>
      <p class="sub">Один блок. Один день. Один дроп на ник. Реролла нет.</p>
      <div id="beacon" class="beacon">Ищу сегодняшний блок…</div>
    </header>

    <section class="panel">
      <label class="field">
        <span>Твой ник</span>
        <input id="uname" type="text" maxlength="24" placeholder="напр. satoshi" autocomplete="off" />
      </label>
      <button id="openBtn" class="open-btn" disabled>Открыть реликвию дня</button>
      <p id="hint" class="hint"></p>
    </section>

    <section id="cardHost" class="card-host" hidden>
      <!-- карточка вставляется скриптом -->
    </section>

    <section id="shareRow" class="share-row" hidden>
      <button id="shareX" class="share-btn x">Поделиться в 𝕏</button>
      <button id="copyLink" class="share-btn ghost">Скопировать ссылку</button>
    </section>

    <section class="collection">
      <div class="collection-head">
        <h2>Коллекция</h2>
        <div class="streak" id="streak">Стрик: 0 дн.</div>
      </div>
      <div id="grid" class="grid"></div>
      <p id="emptyColl" class="empty">Пока пусто. Открой первую реликвию ☝️</p>
    </section>

    <section id="feedSection" class="feed-section" hidden>
      <h2 id="feedTitle" class="feed-title">Последние дропы</h2>
      <div id="feedStrip" class="feed-strip"></div>
    </section>

    <footer class="foot">
      <p>Дроп детерминирован: <code>дата + хеш блока + ник</code>. Никто не может подкрутить — исходник открыт.</p>
    </footer>
  </main>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Crypto Relic Day",
    "url": "https://cryptorelicday.github.io/crypto-relic/",
    "description": "Daily provably-fair collectible case opener sealed by a real Bitcoin block hash. One drop per name per day, no rerolls.",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Web",
    "inLanguage": ["en", "ru"],
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "image": "https://cryptorelicday.github.io/crypto-relic/og-image.png"
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
