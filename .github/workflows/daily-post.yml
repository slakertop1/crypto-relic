# Ежедневный пост «дроп дня» в X от @CryptoRelicDay.
# Режим задаётся repo-переменной POST_MODE:
#   draft (по умолчанию) — прислать готовый текст в Telegram (постишь руками);
#   live — опубликовать в X автоматически (нужны кредиты X API).
name: daily-post
on:
  schedule:
    - cron: '0 15 * * *'   # 15:00 UTC ежедневно
  workflow_dispatch:        # ручной запуск

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Compose (and post if live)
        run: node scripts/xpost.mjs
        env:
          POST_MODE: ${{ vars.POST_MODE || 'draft' }}
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      - name: Send draft to Telegram
        if: ${{ (vars.POST_MODE || 'draft') != 'live' }}
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node -e '
          const fs = require("fs");
          const draft = fs.readFileSync("draft.txt", "utf8");
          const text = "📤 Пост дня для X — скопируй и опубликуй:\n\n" + draft;
          fetch("https://api.telegram.org/bot" + process.env.TG_BOT_TOKEN + "/sendMessage", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: process.env.TG_CHAT_ID, text, disable_web_page_preview: true }),
          }).then(r => r.json()).then(j => {
            if (!j.ok) { console.error(JSON.stringify(j)); process.exit(1); }
            console.log("draft sent to Telegram");
          });
          '
